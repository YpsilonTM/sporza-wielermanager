<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sporza Wielermanager Bot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .sub { color: var(--muted); margin-bottom: 1.5rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: 1fr 1fr; }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      border: 1px solid #334155;
    }
    .card h2 { margin: 0 0 0.75rem; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    button {
      background: var(--accent);
      color: #052e16;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-top: 0.5rem;
    }
    button.secondary { background: #334155; color: var(--text); }
    #logs {
      font-family: ui-monospace, monospace;
      font-size: 0.85rem;
      max-height: 360px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    .log-line { border-bottom: 1px solid #334155; padding: 0.35rem 0; }
    .badge {
      display: inline-block;
      background: #334155;
      border-radius: 999px;
      padding: 0.15rem 0.55rem;
      font-size: 0.75rem;
      margin-left: 0.35rem;
    }
    .badge.warn { background: #78350f; color: #fde68a; }
  </style>
</head>
<body>
  <main>
    <h1>Sporza Wielermanager</h1>
    <p class="sub">API + AI teammanager dashboard</p>

    <div class="grid">
      <section class="card">
        <h2>Status</h2>
        <div id="status">Laden...</div>
        <button type="button" id="refresh">Vernieuwen</button>
        <button type="button" class="secondary" id="auth">Auth refresh</button>
      </section>

      <section class="card">
        <h2>Acties</h2>
        <p style="color: var(--muted); margin-top: 0;">Nieuw seizoen of lege ploeg? Bouw eerst je squad. Daarna lineup.</p>
        <button type="button" class="secondary" id="rosterDryRun">Roster dry-run</button>
        <button type="button" class="secondary" id="rosterSubmit">Roster indienen</button>
        <button type="button" class="secondary" id="dryRun">Lineup dry-run</button>
        <button type="button" id="submit">Lineup indienen</button>
      </section>
    </div>

    <section class="card" style="margin-top: 1rem;">
      <h2>Live logs</h2>
      <div id="logs"></div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const logsEl = document.getElementById("logs");

    function addLog(message) {
      const line = document.createElement("div");
      line.className = "log-line";
      line.textContent = `[${new Date().toLocaleTimeString("nl-BE")}] ${message}`;
      logsEl.prepend(line);
    }

    async function loadOverview() {
      const res = await fetch("/overview");
      const data = await res.json();
      if (data.error) {
        statusEl.textContent = data.error;
        return;
      }

      const gs = data.gameStatus || {};
      const match = data.upcomingMatch;
      const lineup = data.upcomingLineup;
      const transfers = data.transferState;
      statusEl.innerHTML = `
        <div><strong>${data.edition?.name ?? "?"}</strong></div>
        <div>Speler: ${gs.user?.name ?? "niet ingelogd"}</div>
        <div>Ploeg: ${gs.gameTeam?.name ?? "—"} <span class="badge">${gs.gameTeam?.teamType ?? "?"}</span></div>
        <div>Roster: ${gs.roster?.length ?? 0} renners</div>
        ${transfers ? `<div>Transfers: ${transfers.usedTransfers} gebruikt (${transfers.freeTransfersRemaining} gratis over)${transfers.transfersOpen ? "" : " — nog gesloten vóór rit 1"}</div>` : ""}
        ${match ? `<div style="margin-top:0.75rem">Volgende rit: <strong>${match.name}</strong> (${match.matchType}, ${match.terrainType})
          <span class="badge ${match.autoManageScheduled ? "warn" : ""}">${match.minutesUntilDeadline ?? "?"} min</span></div>` : ""}
        ${lineup ? `<div style="margin-top:0.75rem">Lineup: ${lineup.starters.length} starters, ${lineup.bench.length} bank</div>` : match ? `<div style="margin-top:0.75rem;color:var(--muted)">Lineup: nog niet ingediend</div>` : ""}
      `;
    }

    document.getElementById("refresh").addEventListener("click", loadOverview);
    document.getElementById("auth").addEventListener("click", async () => {
      await fetch("/run/auth-refresh", { method: "POST" });
      addLog("Auth refresh gestart");
    });
    document.getElementById("rosterDryRun").addEventListener("click", async () => {
      addLog("Roster dry-run gestart...");
      const res = await fetch("/run/roster?dryRun=1", { method: "POST" });
      const data = await res.json();
      addLog(data.error ? `Fout: ${data.error}` : `Roster: ${data.summary ?? "klaar"}`);
      loadOverview();
    });
    document.getElementById("rosterSubmit").addEventListener("click", async () => {
      if (!confirm("Initiële ploeg echt indienen bij Sporza?")) return;
      addLog("Roster indienen...");
      const res = await fetch("/run/roster", { method: "POST" });
      const data = await res.json();
      addLog(data.error ? `Fout: ${data.error}` : `Roster: ${data.summary ?? "ingediend"}`);
      loadOverview();
    });
    document.getElementById("dryRun").addEventListener("click", async () => {
      addLog("AI dry-run gestart...");
      const res = await fetch("/run/manage?dryRun=1", { method: "POST" });
      const data = await res.json();
      addLog(data.error ? `Fout: ${data.error}` : `Voorstel: ${data.summary}`);
      loadOverview();
    });
    document.getElementById("submit").addEventListener("click", async () => {
      if (!confirm("Lineup echt indienen bij Sporza?")) return;
      addLog("AI indienen...");
      const res = await fetch("/run/manage", { method: "POST" });
      const data = await res.json();
      addLog(data.error ? `Fout: ${data.error}` : `Ingediend: ${data.summary}`);
      loadOverview();
    });

    const es = new EventSource("/logs");
    es.onmessage = (event) => {
      try {
        const payload = JSON.parse(event.data);
        if (payload.type === "log") addLog(payload.message);
        if (payload.type === "manage") addLog(`Manage ${payload.matchName}: ${payload.summary}`);
        if (payload.type === "roster") addLog(`Roster: ${payload.summary}`);
      } catch {
        // ignore
      }
    };

    loadOverview();
    setInterval(loadOverview, 60_000);
  </script>
</body>
</html>
