# Example stack for a home server (Docker Compose v2).
# 1. cp .env.example .env and fill in secrets
# 2. docker compose up -d --build
# 3. open http://<host>:3000

services:
  wielermanager:
    build: .
    image: sporza-wielermanager:latest
    container_name: sporza-wielermanager
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      RUNNING_IN_DOCKER: "true"
      BROWSER_MODE: auto
      HEADLESS: "true"
      NODE_ENV: production
      # Persist cookies + manager log on the volume
      WIELERMANAGER_COOKIES_FILE: .wielermanager_cookies.json
      MANAGER_LOG_FILE: .manager_log.jsonl
    volumes:
      - wielermanager-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  wielermanager-data:
